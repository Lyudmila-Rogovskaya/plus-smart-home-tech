server:
  port: 8888

spring:
  application:
    name: config-server
  profiles:
    active: native
  cloud:
    config:
      server:
        native:
          searchLocations:
            - classpath:/config/telemetry/
            - classpath:/config/commerce/
            - classpath:/config/infra/gateway/
          addLabelLocations: false

eureka:
  client:
    serviceUrl:
      defaultZone: http://localhost:8761/eureka/

logging:
  level:
    root: DEBUG
    org.springframework.cloud.config.server: DEBUG
    org.springframework.cloud.config.server.environment: TRACE
